name: Build

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g. v1.4.0). Leave empty for build-only."
        required: false

jobs:
  build:
    runs-on: windows-latest
    outputs:
      zip_name: ${{ steps.artifacts.outputs.zip_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          pip install "semver>=3.0.1"
          python - <<'PY'
          import os, semver
          tag = os.environ["RELEASE_TAG"].lstrip("v")
          v = semver.Version.parse(tag)
          pre = repr(v.prerelease) if v.prerelease else "None"
          build = repr(v.build) if v.build else "None"
          content = (
              "import semver\n"
              "\n"
              f"__version_semver__ = semver.Version(major={v.major}, minor={v.minor}, "
              f"patch={v.patch}, prerelease={pre}, build={build})\n"
              "__version__ = str(__version_semver__)\n"
          )
          with open("p99_sso_login_proxy/__init__.py", "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Stamped version: {v}")
          PY

      - name: Build
        run: |
          pip install tox
          tox -e build

      - name: Resolve artifact names
        id: artifacts
        shell: pwsh
        run: |
          $zip = Get-ChildItem dist -Filter "P99LoginProxy-*.zip" | Select-Object -First 1
          "zip_name=$($zip.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: p99-login-proxy
          path: dist/P99LoginProxy-*.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: p99-login-proxy
          path: dist

      - name: Detect pre-release tag
        id: prerelease
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          # Strip leading 'v', check for hyphen (semver pre-release separator)
          VERSION="${TAG#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          files: dist/P99LoginProxy-*.zip

  notify:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          ZIP_NAME: ${{ needs.build.outputs.zip_name }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi
          RELEASE_URL="${SERVER_URL}/${REPO}/releases/tag/${TAG}"
          ZIP_URL="${SERVER_URL}/${REPO}/releases/download/${TAG}/${ZIP_NAME}"
          payload=$(jq -n \
            --arg title "P99 Login Proxy ${TAG}" \
            --arg url "$RELEASE_URL" \
            --arg desc "New release available. [Download ${ZIP_NAME}](${ZIP_URL}) or view all assets on the [release page](${RELEASE_URL})." \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5814783
              }]
            }')
          curl -fsS -H "Content-Type: application/json" -X POST -d "$payload" "$WEBHOOK_URL"
