name: Build

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (e.g. v1.4.0). Leave empty for build-only."
        required: false

jobs:
  build:
    runs-on: windows-latest
    outputs:
      exe_name: ${{ steps.artifacts.outputs.exe_name }}
      zip_name: ${{ steps.artifacts.outputs.zip_name }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          python -m pip install --upgrade pip
          pip install "semver>=3.0.1"
          python - <<'PY'
          import os
          import semver
          tag = os.environ["RELEASE_TAG"].lstrip("v")
          v = semver.Version.parse(tag)
          pre = repr(v.prerelease) if v.prerelease else "None"
          build = repr(v.build) if v.build else "None"
          content = (
              "import semver\n"
              "\n"
              f"__version_semver__ = semver.Version(major={v.major}, minor={v.minor}, "
              f"patch={v.patch}, prerelease={pre}, build={build})\n"
              "__version__ = str(__version_semver__)\n"
          )
          with open("p99_sso_login_proxy/__init__.py", "w", encoding="utf-8") as f:
              f.write(content)
          print(f"Stamped version: {v}")
          PY

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Build with PyInstaller
        run: pyinstaller P99LoginProxy.spec

      - name: Resolve artifact names
        id: artifacts
        shell: pwsh
        run: |
          $exe = Get-ChildItem dist -Filter "KingdomLoginProxy-*.exe" | Select-Object -First 1
          "exe_name=$($exe.Name)" >> $env:GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: p99-login-proxy
          path: |
            dist/KingdomLoginProxy-*.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v7
        with:
          name: p99-login-proxy
          path: dist

      - name: Package exe into zip for auto-updater
        run: |
          cd dist
          for exe in KingdomLoginProxy-*.exe; do
            zip "${exe%.exe}.zip" "$exe"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/KingdomLoginProxy-*.exe
            dist/KingdomLoginProxy-*.zip

  notify:
    runs-on: ubuntu-latest
    needs: [build, release]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.tag
    steps:
      - name: Post to Discord
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG: ${{ github.event.inputs.tag || github.ref_name }}
          REPO: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
          EXE_NAME: ${{ needs.build.outputs.exe_name }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord notification."
            exit 0
          fi
          RELEASE_URL="${SERVER_URL}/${REPO}/releases/tag/${TAG}"
          EXE_URL="${SERVER_URL}/${REPO}/releases/download/${TAG}/${EXE_NAME}"
          payload=$(jq -n \
            --arg title "Kingdom Login Proxy ${TAG}" \
            --arg url "$RELEASE_URL" \
            --arg desc "New release available. [Download ${EXE_NAME}](${EXE_URL}) or view all assets on the [release page](${RELEASE_URL})." \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 5814783
              }]
            }')
          curl -fsS -H "Content-Type: application/json" -X POST -d "$payload" "$WEBHOOK_URL"
