[tox]
minversion = 4.0
envlist = lint
isolated_build = true

# Default: lint (+ format check). Same layout as roboToald/tox.ini (lint/format; roboToald also has test/cov).

[testenv]
# Prefer the project venv at `.venv-3.13` (see pyproject basedpyright). Override: TOX_BASEPYTHON=python3.13
basepython = {env:TOX_BASEPYTHON:{toxinidir}/.venv-3.13/Scripts/python.exe}

[testenv:lint]
description = Ruff lint and format check (read-only). Use env "format" to write formatted files.
skip_install = true
deps = ruff
commands =
    ruff check {posargs:.}
    ruff format --check {posargs:.}

[testenv:format]
description = Apply ruff formatting and safe auto-fixes (writes files)
skip_install = true
deps = ruff
commands =
    ruff format {posargs:.}
    ruff check --fix {posargs:.}

[testenv:test]
description = Unit tests (inventory parser, etc.)
deps = pytest
commands =
    pytest {posargs:tests}

[testenv:build]
description = Build exe with custom bootloader via PyInstaller
# Pillow: PyInstaller uses it to convert the PNG icon to ICO for the Windows exe.
deps =
    pyinstaller
    Pillow>=10.0
commands =
    python build_bootloader.py
    pyinstaller P99LoginProxy.spec
